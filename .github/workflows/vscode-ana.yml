name: VS Code ANA Extension

on:
  push:
    branches:
      - main
    paths:
      - "tools/vscode-ana/**"
      - "docs/020-vscode-plugin-v0-1-workflow.md"
      - "docs/021-vscode-plugin-v0-2-diagnostics.md"
      - "docs/022-vscode-plugin-v0-3-rich-experience.md"
  pull_request:
    branches:
      - main
    paths:
      - "tools/vscode-ana/**"
      - "docs/020-vscode-plugin-v0-1-workflow.md"
      - "docs/021-vscode-plugin-v0-2-diagnostics.md"
      - "docs/022-vscode-plugin-v0-3-rich-experience.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tools/vscode-ana

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/vscode-ana/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Test
        run: xvfb-run -a npm test

      - name: Set CI build version
        run: node scripts/bump-build-version.mjs --build-number "$GITHUB_RUN_NUMBER"

      - name: Package VSIX
        run: npm run package:current

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: ana-vscode-vsix
          path: tools/vscode-ana/*.vsix
          if-no-files-found: error
