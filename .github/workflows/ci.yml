name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  c89:
    name: C89 (${{ matrix.compiler }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Build library, examples, and tools
        run: make clean all CC=${{ matrix.compiler }}

      - name: Run tests
        run: make test CC=${{ matrix.compiler }}
