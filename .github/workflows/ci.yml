name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  c89:
    name: C89 (${{ matrix.compiler }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang python3

      - name: Build library, examples, and tools
        run: make clean all CC=${{ matrix.compiler }}

      - name: Run tests
        run: make test CC=${{ matrix.compiler }}

  amiga-adfs:
    name: Amiga example ADFs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install ADF builder
        run: go install github.com/sphair/gadf/cmd/gadf@v1.0.0

      - name: Build Amiga examples
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work" \
            -w /work \
            amigadev/crosstools:m68k-amigaos-gcc10_amd64 \
            make clean amiga-examples amiga-a1200-examples amiga-invaders-a1200-debug

      - name: Build ADF images
        run: make adfs invaders-a1200-adf invaders-a1200-debug-adf ADFTOOL="$HOME/go/bin/gadf"

      - name: Upload ADF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ana-example-adfs
          path: build/adf/*.adf
          if-no-files-found: error
